x-absences:
- No unified TransPerfect developer portal at transperfect.com.
- No public OpenAPI specification for GlobalLink TMS, Web, Portal, CCMS, Now, Media,
  Live, TV, Share, Scribe, Voice, Translate & Review, Write, or Tower LLM.
- No public OpenAPI specification despite documented REST API for GlobalLink Strings
  (legacy Applanga endpoints).
- No published REST/GraphQL endpoint catalog for MediaNEXT broadcast platform.
- No public pricing pages; all commercial engagement runs through sales contact.
- No status page or system health portal publicly indexed.
- No RSS feed surfaced on the corporate blog.
- TransPerfect/globallink GitHub repository last updated 2016; main TransPerfect GitHub
  org has only one public repository.
- No published AsyncAPI, webhook schema reference, or event catalog for any GlobalLink
  module despite the API exposing a webhooks resource.
