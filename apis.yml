- aid: transperfect:globallink-drupal
  name: GlobalLink Drupal Connector
  description: Open-source PHP Drupal module exposing GlobalLink translation submission
    and retrieval inside Drupal sites, with sub-modules for blocks, entities, menus,
    taxonomy, and webforms, configured via GlobalLink credentials and Drupal-to-GlobalLink
    locale mapping.
  humanURL: https://github.com/TransPerfect/globallink
  tags:
  - Drupal
  - CMS Connector
  - PHP
  - Translation Workflow
  properties:
  - type: SourceCode
    url: https://github.com/TransPerfect/globallink
  - type: License
    url: https://github.com/TransPerfect/globallink
  x-language: PHP
  x-status: Legacy
